# Lean CI: backend lint+test + MCP smoke. Est. runtime: ~2min

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-memory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agent-memory/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-timeout

      - name: Lint
        run: ruff check backend/

      - name: Test
        run: pytest backend/tests/ -x -q --timeout=30
        env:
          PYTHONPATH: .

  mcp-package-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-memory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-mcp-pip-${{ hashFiles('agent-memory/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-mcp-pip-

      - name: Install MCP package
        run: pip install .

      - name: Smoke test
        run: agm-memory-mcp --help
